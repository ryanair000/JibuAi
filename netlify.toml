[build]
  command = "npm run build"
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/webhook"
  to = "/.netlify/functions/webhook"
  status = 200

[[redirects]]
  from = "/admin/conversations"
  to = "/.netlify/functions/admin?resource=conversations"
  status = 200

[[redirects]]
  from = "/admin/messages"
  to = "/.netlify/functions/admin?resource=messages"
  status = 200

[[redirects]]
  from = "/admin/webhook-events"
  to = "/.netlify/functions/admin?resource=webhook-events"
  status = 200
